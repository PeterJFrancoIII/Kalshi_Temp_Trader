name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-checks:
    name: Python syntax and focused tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest streamlit pandas

      - name: Compile critical modules
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend:${{ github.workspace }}/backend/src
        run: |
          python -m py_compile \
            backend/src/web_console.py \
            backend/src/twc_nws_comparison.py \
            backend/src/pages/4_TWC_vs_NWS_Comparison.py

      - name: Run focused tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend:${{ github.workspace }}/backend/src
        run: |
          pytest -q \
            backend/tests/test_twc_nws_comparison.py \
            backend/tests/test_twc_kmia_client.py \
            backend/tests/test_weather_providers_page.py \
            backend/tests/test_paper_ledger.py
